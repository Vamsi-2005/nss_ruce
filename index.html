<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSS Registration</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Segoe UI;background:linear-gradient(to right,#1e3c72,#2a5298);}
.registration-form{display:flex;justify-content:center;align-items:center;min-height:100vh;}
.form{background:#fff;padding:30px;width:95%;max-width:650px;border-radius:12px;}
.form-row{display:flex;gap:10px;}
.form-group{flex:1;display:flex;flex-direction:column;}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
input[type="radio"],input[type="checkbox"]{width:auto;}
.radio-group{display:flex;gap:15px;}
.checkbox-group{display:flex;align-items:center;gap:8px;}
.form-buttons{display:flex;gap:10px;}
button{flex:1;padding:10px;border:none;border-radius:6px;font-weight:bold;}
.submit-btn{background:#1e3c72;color:white;}
.reset-btn{background:#ccc;}
.preview{margin-top:5px;height:80px;object-fit:cover;display:none;}
@media(max-width:600px){.form-row{flex-direction:column;}}
</style>
</head>

<body>

<div class="registration-form">
<form class="form" enctype="multipart/form-data">

<h2>NSS Registration</h2>

<fieldset>
<legend>Basic</legend>
<div class="form-row">
<div class="form-group"><input type="text" name="full_name" placeholder="Full Name" required></div>
<div class="form-group"><input type="text" name="roll_number" placeholder="Roll Number" required></div>
</div>

<div class="form-row">
<div class="form-group"><input type="text" name="year" placeholder="Year" required></div>
<div class="form-group"><input type="text" name="department" placeholder="Department" required></div>
</div>
</fieldset>

<fieldset>
<legend>Personal</legend>
<div class="radio-group">
<label><input type="radio" name="gender" value="Male" required>Male</label>
<label><input type="radio" name="gender" value="Female">Female</label>
</div>

<input type="date" name="dob" required>

<select name="blood_group" required>
<option value="">Blood Group</option>
<option>A+</option><option>B+</option><option>O+</option>
</select>

<input type="text" name="aadhaar" placeholder="Aadhaar Number" required>

<select name="category" required>
<option value="">Category</option>
<option>General</option><option>OBC</option><option>SC</option><option>ST</option>
</select>
</fieldset>

<fieldset>
<legend>Contact</legend>
<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="address" placeholder="Address"></textarea>
</fieldset>

<fieldset>
<legend>Upload</legend>

<label>Photo (Max 150KB)</label>
<input type="file" name="photo" accept="image/*" required>
<img id="photoPreview" class="preview">

<label>Signature (Max 50KB)</label>
<input type="file" name="signature" accept="image/*" required>
<img id="signPreview" class="preview">

</fieldset>

<fieldset>
<div class="checkbox-group">
<input type="checkbox" required>
<label>I agree to follow NSS rules</label>
</div>
</fieldset>

<div class="form-buttons">
<button type="submit" class="submit-btn">Register</button>
<button type="reset" class="reset-btn">Reset</button>
</div>

</form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://uspuvskzqhomtovzsjak.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzcHV2c2t6cWhvbXRvdnpzamFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTA2ODUsImV4cCI6MjA5MDcyNjY4NX0.aDFej2tNwEuk8dIl90pOdSU6IA7VTOCA5eGnsQUAtZU"
);

const form = document.querySelector(".form");

// Preview
form.photo.onchange = e => {
  const f = e.target.files[0];
  if(f){
    photoPreview.src = URL.createObjectURL(f);
    photoPreview.style.display="block";
  }
};

form.signature.onchange = e => {
  const f = e.target.files[0];
  if(f){
    signPreview.src = URL.createObjectURL(f);
    signPreview.style.display="block";
  }
};

// Submit
form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  const photo = form.photo.files[0];
  const sign = form.signature.files[0];

  // ✅ Validation
  if(photo.size > 150*1024) return alert("Photo >150KB");
  if(sign.size > 50*1024) return alert("Signature >50KB");

  if(!photo.type.startsWith("image/")) return alert("Invalid photo");
  if(!sign.type.startsWith("image/")) return alert("Invalid signature");

  // Upload
  const {data:pData,error:pErr} = await supabaseClient.storage.from("uploads")
  .upload(`photos/${Date.now()}_${photo.name}`,photo);

  if(pErr) return alert("Photo upload failed");

  const {data:sData,error:sErr} = await supabaseClient.storage.from("uploads")
  .upload(`sign/${Date.now()}_${sign.name}`,sign);

  if(sErr) return alert("Signature upload failed");

  const photoUrl = supabaseClient.storage.from("uploads").getPublicUrl(pData.path).data.publicUrl;
  const signUrl = supabaseClient.storage.from("uploads").getPublicUrl(sData.path).data.publicUrl;

  // Insert
  const {error} = await supabaseClient.from("students").insert([{
    full_name: form.full_name.value,
    roll_number: form.roll_number.value,
    year: form.year.value,
    department: form.department.value,
    gender: form.gender.value,
    dob: form.dob.value,
    blood_group: form.blood_group.value,
    aadhaar: form.aadhaar.value,
    category: form.category.value,
    phone: form.phone.value,
    email: form.email.value,
    address: form.address.value,
    photo_url: photoUrl,
    signature_url: signUrl
  }]);

  if(error){
    alert(error.message);
  } else {
    alert("✅ Success");
    form.reset();
    photoPreview.style.display="none";
    signPreview.style.display="none";
  }
});
</script>

</body>
</html>
